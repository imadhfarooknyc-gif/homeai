<!DOCTYPE html>
<html>
<head>
  <title>HomeAI</title>
</head>
<body>
  <h1>Welcome to HomeAI</h1>
  <p>Your smart assistant</p>

  <input type="text" id="input" placeholder="Ask something..." />
  <button onclick="send()">Send</button>

  <p id="output"></p>

  <script>
    function send() {
      let input = document.getElementById("input").value;
      document.getElementById("output").innerText = "You said: " + input;
    }
  </script>
</body>
</html>
